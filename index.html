<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Kenneth Rios is an AI engineer and backend developer building LLM systems, automation, APIs, and Cloudflare Workers."
    />
    <meta name="theme-color" content="#fafafa" />
    <title>Kenneth Rios</title>
    <script>
      (() => {
        const themeColorDark = "#1d1f21";
        const themeColorLight = "#fafafa";
        const root = document.documentElement;
        const storedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : "system";
        const dark = theme === "dark" || (theme === "system" && prefersDark);
        root.classList.toggle("dark", dark);
        root.style.colorScheme = dark ? "dark" : "light";
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", dark ? themeColorDark : themeColorLight);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
