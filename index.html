<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Kenneth Rios is an AI engineer and backend developer building LLM systems, automation, APIs, and Cloudflare Workers."
    />
    <meta name="theme-color" content="#fbfbfa" />
    <title>Kenneth Rios, AI Engineer</title>

    <!-- Favicons. Default = dark; PNGs swap with the system color scheme. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-dark-32.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-dark-16.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-light-32.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-light-16.png" media="(prefers-color-scheme: light)" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&display=swap"
    />
    <script>
      (() => {
        const themeColorDark = "#0e0e10";
        const themeColorLight = "#fbfbfa";
        const root = document.documentElement;
        const storedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : "system";
        const dark = theme === "dark" || (theme === "system" && prefersDark);
        root.classList.toggle("dark", dark);
        root.style.colorScheme = dark ? "dark" : "light";
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", dark ? themeColorDark : themeColorLight);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
